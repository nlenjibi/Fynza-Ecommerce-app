name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
      - 'fix/**'
      - 'backend-only/**'
      - 'frontend-only/**'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Stage 1: Setup & Change Detection
  # ═══════════════════════════════════════════════════════════════
  setup:
    runs-on: ubuntu-latest
    outputs:
      backend-changed: ${{ steps.changes.outputs.backend }}
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      backend-tests: ${{ steps.changes.outputs.backend_tests }}
      monitoring-changed: ${{ steps.changes.outputs.monitoring }}
      skip-docker: ${{ steps.changes.outputs.skip_docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          # Detect what changed
          if git diff --quiet origin/main...HEAD -- backend/ 2>/dev/null; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --quiet origin/main...HEAD -- 'backend/**/*Test*.java' 2>/dev/null; then
            echo "backend_tests=true" >> $GITHUB_OUTPUT
          else
            echo "backend_tests=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --quiet origin/main...HEAD -- frontend/ 2>/dev/null; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --quiet origin/main...HEAD -- monitoring/ docker-compose.yml nginx/ 2>/dev/null; then
            echo "monitoring=true" >> $GITHUB_OUTPUT
          else
            echo "monitoring=false" >> $GITHUB_OUTPUT
          fi
          
          # Check if we should skip Docker builds (only config/doc changes)
          if git diff --quiet origin/main...HEAD -- backend/ frontend/ 2>/dev/null; then
            echo "skip_docker=false" >> $GITHUB_OUTPUT
          else
            echo "skip_docker=true" >> $GITHUB_OUTPUT
          fi

  # ═══════════════════════════════════════════════════════════════
  # Stage 2: Backend CI
  # ═══════════════════════════════════════════════════════════════
  backend-ci:
    needs: setup
    runs-on: ubuntu-latest
    if: needs.setup.outputs.backend-changed == 'true' || github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B -DskipTests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_REDIS_HOST: localhost
          SPRING_PROFILES_ACTIVE: test

      - name: Run unit tests
        run: mvn test -B
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_REDIS_HOST: localhost
          SPRING_PROFILES_ACTIVE: test

      - name: Run integration tests
        run: mvn verify -B -DskipUnitTests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_REDIS_HOST: localhost
          SPRING_PROFILES_ACTIVE: test
        continue-on-error: true

      - name: Run code quality checks
        run: mvn checkstyle:check spotbugs:check pmd:check -B || true
        working-directory: backend
        continue-on-error: true

      - name: SonarQube scan
        run: |
          if [ -n "${{ secrets.SONAR_HOST_URL }}" ] && [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            mvn sonar:sonar -Dsonar.projectKey=${{ github.repository }}-backend -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.login=${{ secrets.SONAR_TOKEN }}
          fi
        working-directory: backend
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 30

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # Stage 3: Frontend CI
  # ═══════════════════════════════════════════════════════════════
  frontend-ci:
    needs: setup
    runs-on: ubuntu-latest
    if: needs.setup.outputs.frontend-changed == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run linter
        run: npm run lint || npm run lint:fix || true
        working-directory: frontend
        continue-on-error: true

      - name: Check TypeScript
        run: npm run type-check || npm run type-check -- --noEmit || true
        working-directory: frontend
        continue-on-error: true

      - name: Build Next.js
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - name: Run tests
        run: npm test -- --run --coverage --passWithNoTests || true
        working-directory: frontend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/.next/
            frontend/dist/
          retention-days: 30

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # Stage 4: Security Scanning
  # ═══════════════════════════════════════════════════════════════
  security-scan:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: always() && (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped')
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Dependency check - Backend
        run: mvn org.owasp:dependency-check-maven:check -B -DfailBuildOnCVSS=10 || true
        working-directory: backend
        continue-on-error: true

      - name: Dependency check - Frontend
        run: npm audit --audit-level=high || true
        working-directory: frontend
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  # Stage 5: Docker Build & Scan
  # ═══════════════════════════════════════════════════════════════
  docker-build-scan:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: needs.setup.outputs.skip_docker == 'false'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          input: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: 'sarif'
          output: 'backend-trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'backend-trivy-results.sarif'

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          input: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: 'sarif'
          output: 'frontend-trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'frontend-trivy-results.sarif'

  # ═══════════════════════════════════════════════════════════════
  # Stage 6: Integration Tests (on dev branch)
  # ═══════════════════════════════════════════════════════════════
  integration-tests:
    needs: docker-build-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run full integration test suite
        run: mvn verify -B
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_REDIS_HOST: localhost
          SPRING_PROFILES_ACTIVE: test

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: backend/target/surefire-reports/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # Stage 7: Semantic Release (on main)
  # ═══════════════════════════════════════════════════════════════
  semantic-release:
    needs: integration-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/github @semantic-release/changelog @semantic-release/git

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release || echo "No release needed"

  # ═══════════════════════════════════════════════════════════════
  # Stage 8: PR Preview Deployment
  # ═══════════════════════════════════════════════════════════════
  deploy-preview:
    needs: docker-build-scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment:
      name: preview
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy preview to Vercel
        id: vercel-preview
        uses: vercel/action@v5
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_ORG_ID }}
          production: false
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.PREVIEW_API_URL }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.vercel-preview.outputs.preview-url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deployment\n\n**URL:** ${previewUrl}\n\nPR #${context.issue.number} - ${{ github.event.pull_request.title }}`
            });

  # ═══════════════════════════════════════════════════════════════
  # Stage 9: Development Deployment (dev branch)
  # ═══════════════════════════════════════════════════════════════
  deploy-dev:
    needs: integration-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment:
      name: development
      url: ${{ secrets.DEV_URL }}
    env:
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Development Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /opt/fynza
            git pull origin dev
            docker compose pull
            docker compose up -d --build
            docker system prune -f
            echo "Dev deployment complete at $(date)"

      - name: Run smoke tests
        run: |
          sleep 15
          curl -f ${{ secrets.DEV_URL }}/actuator/health || exit 1
        continue-on-error: true

      - name: Notify Slack
        if: always() && vars.SLACK_BOT_TOKEN != ''
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_DEV_CHANNEL }}
          payload: |
            {
              "text": "Dev deployment ${{ job.status }}: ${{ github.repository }}@${{ github.ref }}"
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  # Stage 10: Production Deployment (main branch)
  # ═══════════════════════════════════════════════════════════════
  deploy-production:
    needs: [semantic-release, integration-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://yourdomain.com
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/fynza
            git pull origin main
            docker compose pull
            docker compose up -d --build
            docker system prune -f
            echo "Production deployment complete at $(date)"

      - name: Run smoke tests
        run: |
          sleep 20
          curl -f ${{ secrets.PROD_URL }}/actuator/health || exit 1
        continue-on-error: true

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Production Deployment

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref }}`

            Automated production deployment.
          draft: false
          prerelease: false

      - name: Notify Slack
        if: always() && vars.SLACK_BOT_TOKEN != ''
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_PROD_CHANNEL }}
          payload: |
            {
              "text": "Production deployment ${{ job.status }}: ${{ github.repository }}"
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  # Stage 11: Container Registry Push (main & dev)
  # ═══════════════════════════════════════════════════════════════
  push-registry:
    needs: [docker-build-scan, integration-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ./backend/Dockerfile

  # ═══════════════════════════════════════════════════════════════
  # Stage 12: Notify Failure
  # ═══════════════════════════════════════════════════════════════
  notify-failure:
    needs: [backend-ci, frontend-ci, security-scan, docker-build-scan, integration-tests]
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      contents: read
    steps:
      - name: Notify Slack on failure
        if: vars.SLACK_BOT_TOKEN != ''
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_ALERTS_CHANNEL }}
          payload: |
            {
              "text": "CI/CD Failed: ${{ github.repository }} on ${{ github.ref }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*CI/CD Pipeline Failed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref }}\nWorkflow: ${{ github.workflow }}"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
