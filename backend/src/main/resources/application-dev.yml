spring:
  application:
    name: e-store

  datasource:
    url: ${DATABASE_URL}
    username: ${USER_NAME}
    password: ${PASSWORD}
    driver-class-name: ${DATABASE_DRIVER}
    hikari:
      auto-commit: false
      pool-name: FynzaHikariCP
      minimum-idle: 2
      maximum-pool-size: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update  # Drop and recreate tables on startup
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        # Performance optimizations
        jdbc:
          batch_size: 20
          fetch_size: 100
          batch_versioned_data: true
        query:
          in_clause_parameter_padding: true
          plan_cache_max_size: 2048
        default_batch_fetch_size: 20
        # Disable automatic flush at end of transactions for read-only
        flushMode: AUTO
        # Enable SQL statement caching
        statement_cache:
          size: 2048

  # Flyway Configuration
  flyway:
    enabled: true  # Temporarily disabled to let Hibernate create schema first
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
    out-of-order: false
    clean-disabled: true  # Prevent accidental data loss
    placeholder-replacement: true
    placeholders:
      schema: public

  # Cache configuration for testing (minimal caching)
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=1m,recordStats

  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    path: /graphql
    schema:
      locations: classpath:graphql/
      file-extensions: .graphqls
      printer:
        enabled: true
    cors:
      allowed-origins:
        - "http://localhost:3000"
        - "https://localhost:3000"
      allowed-methods: [ "GET", "POST", "PUT", "DELETE", "OPTIONS" ]
      allowed-headers: [ "*" ]
      allow-credentials: true

  # ✅ Fixed indentation
  thymeleaf:
    check-template-location: false

# Custom cache properties for testing
cache:
  level: redis
  default-ttl: 1   # minute - very short for testing
  product-ttl: 1   # minute
  category-ttl: 2  # minutes
  user-ttl: 1      # minute
  max-size: 100     # entries - small for testing

logging:
  level:
    root: INFO
    com.smart_ecomernce_api: DEBUG
    org.hibernate.tool.schema: ERROR
    org.springframework.graphql: DEBUG
    org.springframework.web: DEBUG
    org.springframework.cache: DEBUG
    com.github.benmanes.caffeine: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: 9190
  servlet:
    context-path: /api
  forward-headers-strategy: framework

#springdoc:
#  api-docs:
#    enabled: true
#    path: /v3/api-docs
#    version: OPENAPI_3_0
#  swagger-ui:
#    enabled: true
#    path: /swagger-ui.html
#    try-it-out-enabled: true
#    operations-sorter: method
#    tags-sorter: alpha
#
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    filter: true
    try-it-out-enabled: true
    persist-authorization: true
  paths-to-match:
    - /**
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

cart:
  auto-cleanup-enabled: false
# JWT Configuration (Fynza: 15 min access, 7 day refresh)
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-chars}
  access-token:
    expiration: 900000  # 15 minutes (900 seconds)
  refresh-token:
    expiration: 604800000  # 7 days (604800 seconds)
  blacklist:
    max-size: 10000
    expire-after-write-hours: 24
  # Token validation cache settings
  cache:
    max-size: 10000
    expire-after-write-minutes: 10
    expire-after-access-minutes: 5

# OAuth2 Configuration
spring.security.oauth2.client.registration.google:
  client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
  client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
  scope: profile, email
  redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  client-name: Google

spring.security.oauth2.client.registration.github:
  client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
  client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
  scope: read:user, user:email
  redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  client-name: GitHub

spring.security.oauth2.client.registration.facebook:
  client-id: ${FACEBOOK_CLIENT_ID:your-facebook-client-id}
  client-secret: ${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
  scope: email, public_profile
  redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  client-name: Facebook

spring.security.oauth2.client.provider.google:
  authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
  token-uri: https://oauth2.googleapis.com/token
  user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
  user-name-attribute: sub

spring.security.oauth2.client.provider.github:
  authorization-uri: https://github.com/login/oauth/authorize
  token-uri: https://github.com/login/oauth/access_token
  user-info-uri: https://api.github.com/user
  user-name-attribute: id

spring.security.oauth2.client.provider.facebook:
  authorization-uri: https://www.facebook.com/v18.0/dialog/oauth
  token-uri: https://graph.facebook.com/v18.0/oauth/access_token
  user-info-uri: https://graph.facebook.com/v18.0/me?fields=id,name,email,picture
  user-name-attribute: id
# Management endpoints for cache monitoring in tests
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches,cache
  endpoint:
    health:
      show-details: always
    caches:
      enabled: true
  metrics:
    export:
      simple:
        enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourdomain.com}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  max-age: 3600

# Rate limiting configuration
rate-limit:
  enabled: false  # Set to true to enable rate limiting
  requests-per-minute: 100
  requests-per-second: 10

# Async configuration
async:
  inventory:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
  order:
    core-pool-size: 10
    max-pool-size: 20
    queue-capacity: 200
  payment:
    core-pool-size: 8
    max-pool-size: 15
    queue-capacity: 150
  notification:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
  report:
    core-pool-size: 2
    max-pool-size: 5
    queue-capacity: 50
  image:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 80
  search:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
  timeouts:
    inventory: 3000
    order-validation: 5000
    payment: 30000
    notification: 10000
    report: 300000
    image: 60000
    search-index: 10000

app:
  cors:
    front-end-url: http://localhost:3000

  frontend:
    success-redirect: http://localhost:3000/auth/oauth2/callback
    failure-redirect: http://localhost:3000/auth/login

  # true  → SameSite=None; Secure=true  (required for cross-origin cookies over HTTPS)
  # false → SameSite=Lax;  Secure=false (local HTTP dev only — never use false in production)
  cookie:
    secure: false

# PayPal Configuration (Sandbox)
paypal:
  client-id: ${PAYPAL_CLIENT_ID:your-sandbox-client-id}
  client-secret: ${PAYPAL_CLIENT_SECRET:your-sandbox-client-secret}
  mode: sandbox

# Paystack Configuration
paystack:
  secret-key: ${PAYSTACK_SECRET_KEY:your-paystack-secret-key}
  public-key: ${PAYSTACK_PUBLIC_KEY:your-paystack-public-key}
  base-url: https://api.paystack.co
  webhook-secret: ${PAYSTACK_WEBHOOK_SECRET:}

# Redis Configuration
redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  database: 0
  timeout: 5000ms
  lettuce:
    pool:
      max-active: 8
      max-idle: 8
      min-idle: 2
      max-wait: -1ms
    shutdown-timeout: 100ms
