apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      queryTimeout: 60s
      httpMethod: POST

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: TraceID
          matcherRegex: "trace_id=([A-Za-z0-9]+)"
          url: "http://grafana:3000/explore?left={\"queries\":[{\"query\":\"{filename=\\\"$filename\\\"} |= \\\"${__value}\\\"\",\"refId\":\"A\"}],\"range\":{\"from\":\"now-1h\\\",\\\"to\\\"\\\"now\\\"}}"
          datasourceUid: loki
