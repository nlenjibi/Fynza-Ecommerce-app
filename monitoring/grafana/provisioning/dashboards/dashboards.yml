apiVersion: 1

providers:
  - name: 'Fynza Dashboards'
    orgId: 1
    folder: 'Fynza'
    folderUid: 'fynza'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: true
