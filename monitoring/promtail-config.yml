server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml
  ignore_invalid_yaml: true

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: fynza
    batchwait: 1s
    batchsize: 102400
    timeout: 10s
    retry_interval: 500ms
    retry_max_duration: 5m

scrape_configs:
  # Read logs from Docker containers
  - job_name: docker
    docker:
      host: "unix:///var/run/docker.sock"
      containers:
        path: /var/lib/docker/containers
    relabel_configs:
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Extract container ID (short)
      - source_labels: ['__meta_docker_container_id']
        regex: '(.{12}).*'
        target_label: container_id_short
      # Extract image name
      - source_labels: ['__meta_docker_container_image']
        target_label: image
      # Extract labels
      - action: labelmap
        regex: '__meta_docker_container_label_(.+)'
        replacement: 'label_${1}'
      # Add app name from label or container name
      - source_labels: ['__meta_docker_container_label_app', '__meta_docker_container_name']
        regex: '(.+);/?(.+)'
        target_label: app
        replacement: '${1}'
      # Mark as container log
      - target_label: 'log_source'
        replacement: 'docker'

  # Backend application logs (JSON format)
  - job_name: backend-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: backend
          app: fynza
          env: production
          __path__: /var/log/fynza/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            message: message
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
          logger:
          app:

  # Error-specific parsing for structured logs
  - job_name: error-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: error-logs
          app: fynza
          __path__: /var/log/fynza/errors/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            error_type: error_type
            error_message: error_message
            stack_trace: stack_trace
            user_id: user_id
            request_id: request_id
      - labels:
          level:
          error_type:
          app:

  # Syslog from all containers
  - job_name: syslog
    syslog:
      listen_address: 0.0.0.0:5140
      idle_timeout: 60s
      label_structured_data: true
      labels:
        job: syslog
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: 'hostname'
      - source_labels: ['__syslog_message_app_name']
        target_label: 'app'
      - source_labels: ['__syslog_severity']
        target_label: 'severity'
